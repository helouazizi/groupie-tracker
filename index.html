<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Artists</title>
  
</head>

<body>
    <div class="header">
        <h1 class="logo">G-Tracker</h1>
        <div class="search-bar">
            <input type="text" id="search" placeholder="Search artists..." onkeyup="filterArtists()">
        </div>
        <button class="dark-mode-btn" onclick="toggleDarkMode()">Toggle Dark Mode</button>
    </div>
    <div class="container">
        <div class="grid" id="artistsGrid"></div>
    </div>
    
    <script>
        async function fetchArtists() {
            try {
                let response = await fetch("http://localhost:8080/");
                let artists = await response.json();
                let grid = document.getElementById("artistsGrid");
                grid.innerHTML = "";
                artists.forEach(artist => {
                    let card = document.createElement("div");
                    card.classList.add("card");
                    card.innerHTML = `
                        <img src="${artist.image}" alt="${artist.name}">
                        <div class="card-content">
                            <h3>${artist.name}</h3>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error("Error fetching artists:", error);
            }
        }
        fetchArtists();

        function toggleDarkMode() {
            document.body.classList.toggle("dark-mode");
        }

        function filterArtists() {
            let input = document.getElementById("search").value.toLowerCase();
            let cards = document.querySelectorAll(".card");
            cards.forEach(card => {
                let name = card.querySelector("h3").innerText.toLowerCase();
                card.style.display = name.includes(input) ? "block" : "none";
            });
        }
    </script>
</body>

</html>
