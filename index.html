<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artists</title>
    <style>
        :root {
            --bg-light: #f4f4f4;
            --bg-dark: #1e1e1e;
            --text-light: #333;
            --text-dark: #f4f4f4;
            --card-bg-light: white;
            --card-bg-dark: #2c2c2c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            padding: 10px 20px;
            background: var(--card-bg-light);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .logo {
            width: 150px;
        }

        .search-bar {
            flex: 1;
            margin: 0 20px;
        }

        .search-bar input {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .dark-mode-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #333;
            color: white;
            transition: background 0.3s;
        }

        .dark-mode-btn:hover {
            background: #555;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            text-align: center;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: var(--card-bg-light);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 280px;
            transition: transform 0.3s, background 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
        }

        .card h3 {
            font-size: 1.2em;
        }

        .dark-mode {
            --bg-light: #1e1e1e;
            --text-light: #f4f4f4;
            --card-bg-light: #2c2c2c;
        }

        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .search-bar {
                width: 100%;
                margin: 10px 0;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <h1 class="logo">G-Tracker</h1>
        <div class="search-bar">
            <input type="text" id="search" placeholder="Search artists..." onkeyup="filterArtists()">
        </div>
        <button class="dark-mode-btn" onclick="toggleDarkMode()">Toggle Dark Mode</button>
    </div>
    <div class="container">
        <div class="grid" id="artistsGrid"></div>
    </div>
    
    <script>
        async function fetchArtists() {
            try {
                let response = await fetch("http://localhost:8080/");
                let artists = await response.json();
                let grid = document.getElementById("artistsGrid");
                grid.innerHTML = "";
                artists.forEach(artist => {
                    let card = document.createElement("div");
                    card.classList.add("card");
                    card.innerHTML = `
                        <img src="${artist.image}" alt="${artist.name}">
                        <div class="card-content">
                            <h3>${artist.name}</h3>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error("Error fetching artists:", error);
            }
        }
        fetchArtists();

        function toggleDarkMode() {
            document.body.classList.toggle("dark-mode");
        }

        function filterArtists() {
            let input = document.getElementById("search").value.toLowerCase();
            let cards = document.querySelectorAll(".card");
            cards.forEach(card => {
                let name = card.querySelector("h3").innerText.toLowerCase();
                card.style.display = name.includes(input) ? "block" : "none";
            });
        }
    </script>
</body>

</html>
