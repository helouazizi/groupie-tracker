<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artists</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            padding: 20px;
        }
        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 280px;
            transition: transform 0.3s;
        }
        .card:hover {
            transform: scale(1.05);
        }
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .card-content {
            padding: 15px;
            text-align: center;
        }
        .card h3 {
            font-size: 1.2em;
            color: #333;
        }
        @media (max-width: 600px) {
            .grid {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center; margin-bottom: 20px;">Artists</h1>
        <div class="grid" id="artistsGrid">
            <!-- Artists will be loaded here dynamically -->
        </div>
    </div>
    <script>
        async function fetchArtists() {
            try {
                let response = await fetch("http://localhost:8080/");
                let artists = await response.json();
                let grid = document.getElementById("artistsGrid");
                artists.forEach(artist => {
                    let card = document.createElement("div");
                    card.classList.add("card");
                    card.innerHTML = `
                        <img src="${artist.image}" alt="${artist.name}">
                        <div class="card-content">
                            <h3>${artist.name}</h3>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error("Error fetching artists:", error);
            }
        }
        fetchArtists();
    </script>
</body>
</html>
