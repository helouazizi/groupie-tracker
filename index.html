<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Artists</title>
</head>

<body>
    <div class="header">
        <h1 class="logo"><a href="/">G-Tracker</a></h1>
        <div class="search-bar">
            <input type="text" id="search" placeholder="Search artists..." onkeyup="filterArtists()">

        <button class="dark-mode-btn" onclick="toggleDarkMode()">Toggle Dark Mode</button>
    </div>
    <div class="container">
        <div class="grid" id="artistsGrid"></div>
    </div>
</body>
<script src="script.js"></script>
</html>
