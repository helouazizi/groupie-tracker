<!-- templates/artist.html -->
<!-- templates/artist_details.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Details</title>
</head>

<body>
    <h1>{{ .Name }}</h1>
    <img src="{{ .Image }}" alt="{{ .Name }}'s image" style="width:200px;height:auto;">
    <p><strong>Creation Date:</strong> {{ .CreationDate }}</p>
    <p><strong>First Album:</strong> {{ .FirstAlbum }}</p>
    <p><strong>Members:</strong></p>
    <ul>
        {{ range .Members }}
        <li>{{ . }}</li>
        {{ end }}
    </ul>
    <p><strong>Locations:</strong></p>
    <ul>
        {{ range .Locations }}
        <li>{{ . }}</li>
        {{ end }}
    </ul>
    <p><strong>Concert Dates:</strong></p>
    <ul>
        {{ range .ConcertDate }}
        <li>{{ . }}</li>
        {{ end }}
    </ul>

    <a href="/">back home</a>
</body>

</html>
